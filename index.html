<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humberto RuI - Catálogo Profesional</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:  #C0392B; /* Rojo */
    --primary-vivid: #E74C3C;
    --dark:     #1C1010; /* Negro */
    --cream:    #FAF6EF;
    --white:    #FFFFFF;
    --border:   #E2C8C8;
    --text-mid: #7A5555;
    --success:  #1A6641;
    --shadow:   0 4px 12px rgba(0,0,0,0.08);
  }

  /* ══ RESET & BASE ══ */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--cream);
    color: var(--dark);
    line-height: 1.6;
  }

  /* ══ NAVEGACIÓN SEMÁNTICA ══ */
  .tabs-nav {
    background: var(--dark);
    display: flex;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--primary);
  }
  .tab-btn {
    flex: 1; padding: 16px; border: none; background: transparent;
    color: rgba(255,255,255,0.5); font-weight: 600; cursor: pointer;
    transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .tab-btn.active { color: var(--primary-vivid); background: rgba(255,255,255,0.05); }
  .tab-badge { background: var(--primary); color: white; font-size: 11px; padding: 2px 7px; border-radius: 10px; }

  /* ══ TOOLBAR & BOTONES ══ */
  .toolbar {
    background: var(--dark); color: white; padding: 15px 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .btn {
    padding: 10px 18px; border-radius: 8px; border: none; font-weight: 600; 
    cursor: pointer; font-family: 'Outfit'; transition: 0.2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-vivid); }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-mid); }
  .btn-delete { color: var(--primary); background: none; border: none; cursor: pointer; font-weight: 600; }

  /* ══ HEADER ══ */
  header {
    background: var(--dark); color: white; text-align: center;
    padding: 50px 20px;
  }
  .brand-name { font-family: 'Libre Baskerville', serif; font-size: 2.5rem; }
  .brand-name span { color: var(--primary-vivid); }

  /* ══ GRID RESPONSIVE (Punto 4) ══ */
  main { max-width: 1000px; margin: 0 auto; padding: 30px 15px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }

  /* ══ CARD ESTILO (Punto 6 y 7) ══ */
  .card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; transition: transform 0.3s;
    animation: fadeIn 0.5s ease forwards;
  }
  .card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10); } to { opacity: 1; transform: translateY(0); } }
  
  .card-img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
  .card-body { padding: 15px; }
  .price { font-family: 'Libre Baskerville', serif; color: var(--primary); font-size: 1.3rem; font-weight: 700; }

  /* ══ PEDIDOS ══ */
  .order-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
  .status-pill { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
  .status-pendiente { background: #FFF3DC; color: #92600A; }
  .status-entregado { background: #E8F5EE; color: #1A6641; }

  /* ══ MODALES ══ */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--text-mid); }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Outfit';
  }

  /* ══ TOAST NOTIFICATION (Punto 7) ══ */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--dark); color: white; padding: 12px 25px; border-radius: 50px;
    font-weight: 600; display: none; z-index: 1000; box-shadow: var(--shadow);
  }

  footer { background: var(--dark); color: white; text-align: center; padding: 40px 20px; margin-top: 50px; }
  
  .hidden { display: none; }
</style>
</head>
<body>

<nav class="tabs-nav">
  <button class="tab-btn active" onclick="showTab('catalogo')" id="btn-tab-catalogo">🧀 Catálogo</button>
  <button class="tab-btn" onclick="showTab('pedidos')" id="btn-tab-pedidos">📋 Pedidos <span class="tab-badge" id="badge-count">0</span></button>
</nav>

<section id="sec-catalogo">
  <div class="toolbar">
    <h2 style="font-size: 1.1rem;">NUESTROS PRODUCTOS</h2>
    <button class="btn btn-primary" onclick="openModal('modal-prod')">+ Agregar</button>
  </div>
  
  <header>
    <div class="brand-name">Humberto <span>RuI</span></div>
    <p>Distribuidora Mayorista de Lácteos y Fiambres</p>
  </header>

  <main>
    <div class="grid" id="grid-productos"></div>
  </main>
</section>

<section id="sec-pedidos" class="hidden">
  <div class="toolbar">
    <h2>LISTADO DE PEDIDOS</h2>
    <button class="btn btn-primary" onclick="openModal('modal-ped')">+ Nuevo Pedido</button>
  </div>
  <main id="lista-pedidos"></main>
</section>

<div class="modal-overlay" id="modal-prod">
  <div class="modal">
    <h3>Nuevo Producto</h3><br>
    <div class="form-group"><label>Nombre del Producto</label><input type="text" id="f-name"></div>
    <div class="form-group"><label>Precio ($)</label><input type="number" id="f-price"></div>
    <div class="form-group"><label>Foto (opcional)</label><input type="file" id="f-img" accept="image/*"></div>
    <button class="btn btn-primary" style="width: 100%;" onclick="saveProduct()">Guardar Producto</button>
    <button class="btn-delete" style="width: 100%; margin-top: 15px;" onclick="closeModal('modal-prod')">Cancelar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-ped">
  <div class="modal">
    <h3>Registrar Pedido</h3><br>
    <div class="form-group"><label>Cliente / Negocio</label><input type="text" id="p-cliente"></div>
    <div class="form-group"><label>Detalle del pedido</label><textarea id="p-detalle" rows="3"></textarea></div>
    <div class="form-group"><label>Estado inicial</label>
      <select id="p-status">
        <option value="pendiente">⏳ Pendiente</option>
        <option value="entregado">✅ Entregado</option>
      </select>
    </div>
    <button class="btn btn-primary" style="width: 100%;" onclick="saveOrder()">Crear Pedido</button>
    <button class="btn-delete" style="width: 100%; margin-top: 15px;" onclick="closeModal('modal-ped')">Cerrar</button>
  </div>
</div>

<footer>
  <p><strong>📍 Soldano 370</strong></p>
  <p>📞 +54 9 3562 506757</p>
</footer>

<div id="toast"></div>

<script>
  // PERSISTENCIA
  let products = JSON.parse(localStorage.getItem('hri_v3_prods')) || [];
  let orders = JSON.parse(localStorage.getItem('hri_v3_orders')) || [];

  // PUNTO 3: SEGURIDAD (Escapar HTML para evitar XSS)
  function escape(str) {
    if(!str) return "";
    return str.replace(/[&<>"']/g, function(m) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
    });
  }

  // PUNTO 7: UX (Notificaciones Toast)
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2500);
  }

  function showTab(tab) {
    document.getElementById('sec-catalogo').classList.toggle('hidden', tab !== 'catalogo');
    document.getElementById('sec-pedidos').classList.toggle('hidden', tab !== 'pedidos');
    document.getElementById('btn-tab-catalogo').classList.toggle('active', tab === 'catalogo');
    document.getElementById('btn-tab-pedidos').classList.toggle('active', tab === 'pedidos');
    if(tab === 'catalogo') renderProducts();
    else renderOrders();
  }

  // PRODUCTOS
  function saveProduct() {
    const name = document.getElementById('f-name').value.trim();
    const price = document.getElementById('f-price').value;
    const imgFile = document.getElementById('f-img').files[0];

    if(!name || !price) return alert("Nombre y precio son obligatorios");

    if(imgFile) {
      const reader = new FileReader();
      reader.onload = function(e) {
        products.push({ name, price, img: e.target.result });
        finalizeProductSave();
      };
      reader.readAsDataURL(imgFile);
    } else {
      products.push({ name, price, img: null });
      finalizeProductSave();
    }
  }

  function finalizeProductSave() {
    // PUNTO 7: Ordenar por nombre automáticamente
    products.sort((a,b) => a.name.localeCompare(b.name));
    localStorage.setItem('hri_v3_prods', JSON.stringify(products));
    renderProducts();
    // PUNTO 2: Limpieza de inputs
    document.getElementById('f-name').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-img').value = '';
    closeModal('modal-prod');
    showToast("¡Producto guardado! ✔");
  }

  function renderProducts() {
    const grid = document.getElementById('grid-productos');
    grid.innerHTML = products.map((p, i) => `
      <article class="card">
        ${p.img ? `<img src="${p.img}" class="card-img" alt="${escape(p.name)}">` : `<div class="card-img" style="display:flex;align-items:center;justify-content:center;color:#ccc">Sin imagen</div>`}
        <div class="card-body">
          <h4 style="margin-bottom:5px">${escape(p.name)}</h4>
          <div style="display:flex; justify-content:space-between; align-items:center">
            <span class="price">$${Number(p.price).toLocaleString()}</span>
            <button class="btn-delete" onclick="deleteProduct(${i})">Eliminar</button>
          </div>
        </div>
      </article>
    `).join('');
  }

  function deleteProduct(i) {
    if(confirm("¿Eliminar este producto del catálogo?")) {
      products.splice(i, 1);
      localStorage.setItem('hri_v3_prods', JSON.stringify(products));
      renderProducts();
      showToast("Producto eliminado");
    }
  }

  // PEDIDOS
  function saveOrder() {
    const cliente = document.getElementById('p-cliente').value.trim();
    const detalle = document.getElementById('p-detalle').value.trim();
    const status = document.getElementById('p-status').value;

    if(!cliente || !detalle) return alert("Completa los datos del cliente y pedido");

    orders.push({ cliente, detalle, status, date: new Date().toLocaleDateString() });
    localStorage.setItem('hri_v3_orders', JSON.stringify(orders));
    
    // PUNTO 2: Limpieza
    document.getElementById('p-cliente').value = '';
    document.getElementById('p-detalle').value = '';
    document.getElementById('p-status').value = 'pendiente';
    
    renderOrders();
    closeModal('modal-ped');
    showToast("Pedido registrado 📋");
  }

  function renderOrders() {
    const container = document.getElementById('lista-pedidos');
    const pending = orders.filter(o => o.status === 'pendiente').length;
    document.getElementById('badge-count').textContent = pending;

    if(orders.length === 0) {
      container.innerHTML = `<div style="text-align:center; padding:40px; color:#aaa">No hay pedidos registrados</div>`;
      return;
    }

    container.innerHTML = orders.map((o, i) => `
      <div class="order-card">
        <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:10px">
          <div>
            <h3 style="margin-bottom:2px">${escape(o.cliente)}</h3>
            <small style="color:#aaa">${o.date}</small>
          </div>
          <span class="status-pill status-${o.status}">${o.status}</span>
        </div>
        <p style="background:var(--cream); padding:10px; border-radius:8px; margin-bottom:15px; font-size:14px">${escape(o.detalle)}</p>
        <div style="display:flex; gap:10px">
          ${o.status === 'pendiente' ? `<button class="btn btn-outline" style="color:var(--success);border-color:var(--success)" onclick="markDelivered(${i})">Marcar Entregado ✅</button>` : ''}
          <button class="btn btn-outline" style="color:var(--primary)" onclick="deleteOrder(${i})">Borrar</button>
        </div>
      </div>
    `).reverse().join('');
  }

  function markDelivered(i) {
    orders[i].status = 'entregado';
    localStorage.setItem('hri_v3_orders', JSON.stringify(orders));
    renderOrders();
    showToast("¡Pedido entregado! 🧀");
  }

  function deleteOrder(i) {
    if(confirm("¿Borrar este registro de pedido?")) {
      orders.splice(i, 1);
      localStorage.setItem('hri_v3_orders', JSON.stringify(orders));
      renderOrders();
    }
  }

  // MODALES
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  // INICIO
  renderProducts();
  renderOrders();
</script>
</body>
</html>
