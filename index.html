<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humberto RuI Distribuciones</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:   #FAF6EF;
    --gold:    #C0392B; /* Rojo Principal */
    --gold2:   #E74C3C; /* Rojo Vibrante */
    --dark:    #1C1010; /* Negro profundo */
    --brown:   #7B241C; /* Rojo Vino */
    --mid:     #7A5555;
    --border:  #E2C8C8;
    --white:   #FFFFFF;
    --card-bg: #FFFDF9;
    --green:   #1A6641;
    --green-bg:#E8F5EE;
    --yellow:  #92600A;
    --yellow-bg:#FFF3DC;
    --red:     #C0392B;
    --red-bg:  #FDE8E6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ══ TABS ══ */
  .tabs-nav {
    background: var(--dark);
    display: flex;
    border-bottom: 2px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tab-btn {
    flex: 1; padding: 15px 10px; border: none; background: transparent;
    color: rgba(255,255,255,0.45); font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    border-bottom: 3px solid transparent; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab-btn.active { color: var(--gold2); border-bottom: 3px solid var(--gold); }
  .tab-badge { background: var(--gold); color: white; font-size: 10px; border-radius: 99px; padding: 1px 6px; }

  .page { display: none; }
  .page.active { display: block; }

  /* ══ TOOLBAR ══ */
  .toolbar {
    background: var(--dark); color: var(--white); padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .btn {
    font-size: 13px; padding: 9px 16px; border-radius: 8px; cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.2); background: transparent; color: var(--white);
  }
  .btn-accent { background: var(--gold); border-color: var(--gold); }

  /* ══ HEADER ══ */
  .flyer-header {
    background: var(--dark); color: var(--white); text-align: center;
    padding: 40px 24px; position: relative;
  }
  .header-badge {
    display: inline-block; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold2); border: 1px solid rgba(231,76,60,0.5); border-radius: 99px; padding: 5px 16px; margin-bottom: 16px;
  }
  .store-name { font-family: 'Libre Baskerville', serif; font-size: clamp(26px, 7.5vw, 52px); line-height: 1.1; }
  .store-name span { color: var(--gold2); }

  /* ══ GRID ══ */
  .catalog { max-width: 800px; margin: 0 auto; padding: 24px 14px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .card-img { width: 100%; height: 160px; object-fit: cover; }
  .card-body { padding: 12px; }
  .card-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-price { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 700; color: var(--brown); }
  
  /* ══ PEDIDOS ══ */
  .pedidos-page { max-width: 700px; margin: 0 auto; padding: 20px 14px; }
  .order-card { background: white; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; padding: 15px; }
  .status-pendiente { background: var(--yellow-bg); color: var(--yellow); padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .status-entregado { background: var(--green-bg); color: var(--green); padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }

  /* ══ MODALES ══ */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
  .field { margin-bottom: 15px; }
  .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; }
  .field input, .field textarea, .field select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }

  /* ══ FOOTER ══ */
  .flyer-footer { background: var(--dark); color: white; text-align: center; padding: 30px 20px; border-top: 3px solid var(--gold); }
</style>
</head>
<body>

<nav class="tabs-nav">
  <button class="tab-btn active" onclick="showTab('catalogo')" id="tab-catalogo">🧀 Catálogo</button>
  <button class="tab-btn" onclick="showTab('pedidos')" id="tab-pedidos">📋 Pedidos <span class="tab-badge" id="badge-pendientes">0</span></button>
</nav>

<div class="page active" id="page-catalogo">
  <div class="toolbar">
    <span>GESTIÓN DE CATÁLOGO</span>
    <button class="btn btn-accent" onclick="openModalProd()">+ Agregar</button>
  </div>
  <header class="flyer-header">
    <div class="header-badge">Distribución Mayorista</div>
    <div class="store-name">Humberto <span>RuI</span></div>
    <p style="margin-top:10px; opacity: 0.7">Venta de Quesos y Fiambres</p>
  </header>
  <div class="catalog"><div class="grid" id="grid"></div></div>
  <footer class="flyer-footer">
    <p><strong>📍 Soldano 370</strong></p>
    <p><strong>📞 +54 9 3562 506757</strong></p>
    <p style="font-size: 12px; margin-top: 10px; opacity: 0.5;">Humberto RuI Distribuciones © 2024</p>
  </footer>
</div>

<div class="page" id="page-pedidos">
  <div class="pedidos-page">
    <div style="display:flex; justify-content:between; align-items:center; margin-bottom:20px">
      <h2>Pedidos</h2>
      <button class="btn btn-accent" style="color:black" onclick="openModalPedido()">+ Nuevo</button>
    </div>
    <div id="lista-pedidos"></div>
  </div>
</div>

<div class="modal-bg" id="modal-prod-bg">
  <div class="modal">
    <h3>Nuevo Producto</h3>
    <div class="field"><label>Nombre</label><input id="f-name" type="text"></div>
    <div class="field"><label>Precio</label><input id="f-price" type="number"></div>
    <div class="field"><label>Imagen</label><input id="f-img" type="file" accept="image/*"></div>
    <button class="btn-accent" style="width:100%; padding:10px; border:none; border-radius:8px; color:white" onclick="saveProd()">Guardar</button>
    <button onclick="closeModalProd()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer">Cancelar</button>
  </div>
</div>

<div class="modal-bg" id="modal-ped-bg">
  <div class="modal">
    <h3>Nuevo Pedido</h3>
    <div class="field"><label>Cliente</label><input id="p-cliente" type="text"></div>
    <div class="field"><label>Detalle</label><textarea id="p-productos" rows="3"></textarea></div>
    <div class="field"><label>Estado</label>
      <select id="p-status">
        <option value="pendiente">Pendiente</option>
        <option value="entregado">Entregado</option>
      </select>
    </div>
    <button class="btn-accent" style="width:100%; padding:10px; border:none; border-radius:8px; color:white" onclick="savePedido()">Registrar Pedido</button>
    <button onclick="closeModalPed()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer">Cancelar</button>
  </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('hri_products')) || [];
let pedidos = JSON.parse(localStorage.getItem('hri_pedidos')) || [];

function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if(name === 'pedidos') renderPedidos();
  if(name === 'catalogo') renderCatalog();
}

function saveProd() {
  const name = document.getElementById('f-name').value;
  const price = document.getElementById('f-price').value;
  const imgFile = document.getElementById('f-img').files[0];

  if(!name || !price) return alert("Completá nombre y precio");

  if(imgFile) {
    const reader = new FileReader();
    reader.onload = function(e) {
      products.push({ name, price, img: e.target.result });
      finishSaveProd();
    };
    reader.readAsDataURL(imgFile);
  } else {
    products.push({ name, price, img: '' });
    finishSaveProd();
  }
}

function finishSaveProd() {
  localStorage.setItem('hri_products', JSON.stringify(products));
  renderCatalog();
  closeModalProd();
}

function renderCatalog() {
  const g = document.getElementById('grid');
  g.innerHTML = products.map((p, i) => `
    <div class="card">
      ${p.img ? `<img src="${p.img}" class="card-img">` : `<div style="height:160px; background:#eee; display:flex; align-items:center; justify-content:center">Sin Foto</div>`}
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">$${p.price}</div>
        <button onclick="deleteProd(${i})" style="margin-top:10px; color:red; border:none; background:none; cursor:pointer">Eliminar</button>
      </div>
    </div>
  `).join('');
}

function deleteProd(i) {
  if(confirm("¿Borrar producto?")) {
    products.splice(i, 1);
    localStorage.setItem('hri_products', JSON.stringify(products));
    renderCatalog();
  }
}

function savePedido() {
  const cliente = document.getElementById('p-cliente').value;
  const productos = document.getElementById('p-productos').value;
  const status = document.getElementById('p-status').value;

  if(!cliente) return alert("Poné el nombre del cliente");

  pedidos.push({ cliente, productos, status, fecha: new Date().toLocaleDateString() });
  localStorage.setItem('hri_pedidos', JSON.stringify(pedidos));
  renderPedidos();
  closeModalPed();
}

function renderPedidos() {
  const lista = document.getElementById('lista-pedidos');
  const pend = pedidos.filter(p => p.status === 'pendiente').length;
  document.getElementById('badge-pendientes').textContent = pend;

  lista.innerHTML = pedidos.map((p, i) => `
    <div class="order-card">
      <div style="display:flex; justify-content:space-between">
        <strong>${p.cliente}</strong>
        <span class="status-${p.status}">${p.status.toUpperCase()}</span>
      </div>
      <p style="margin:10px 0; font-size:14px; color:#555">${p.productos}</p>
      <div style="display:flex; justify-content:space-between; align-items:center">
        <small>${p.fecha}</small>
        <div>
          ${p.status === 'pendiente' ? `<button onclick="marcarEntregado(${i})" style="color:green; margin-right:10px; border:none; background:none; cursor:pointer">Entregado ✅</button>` : ''}
          <button onclick="deletePedido(${i})" style="color:red; border:none; background:none; cursor:pointer">Eliminar</button>
        </div>
      </div>
    </div>
  `).reverse().join('');
}

function marcarEntregado(i) {
  pedidos[i].status = 'entregado';
  localStorage.setItem('hri_pedidos', JSON.stringify(pedidos));
  renderPedidos();
}

function deletePedido(i) {
  if(confirm("¿Borrar registro de pedido?")) {
    pedidos.splice(i, 1);
    localStorage.setItem('hri_pedidos', JSON.stringify(pedidos));
    renderPedidos();
  }
}

function openModalProd() { document.getElementById('modal-prod-bg').classList.add('open'); }
function closeModalProd() { document.getElementById('modal-prod-bg').classList.remove('open'); }
function openModalPedido() { document.getElementById('modal-ped-bg').classList.add('open'); }
function closeModalPed() { document.getElementById('modal-ped-bg').classList.remove('open'); }

renderCatalog();
renderPedidos();
</script>
</body>
</html>
